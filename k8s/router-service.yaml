apiVersion: v1
kind: Service
metadata:
  name: openclaw-router
  namespace: openclaw
  labels:
    app: openclaw-router
spec:
  selector:
    app: openclaw-router
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
# PVC for WhatsApp session + tenant registry persistence
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-router-pvc
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
